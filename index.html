<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Algeciras</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/elements.css">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
</head>
<body>

<div class="dice-controls">
    <button class="btn-roll-3d" id="roll-button">🎲 TIRAR DADOS</button>
</div>

<div class="dice-popup-overlay" id="dice-popup">
    <div class="dice-popup-content">
        <h2>Has sacado un</h2>
        <div class="dice-popup-result" id="dice-result-popup">12</div>
        <button class="btn-popup-close" id="close-popup-btn">Continuar</button>
    </div>
</div>

<div id="game-container" style="position: absolute; top:0; left:0; width:100vw; height:100vh; overflow:hidden;"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
